<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Dumbo Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --admin-purple: #c084fc;
            --bg-dark: #0a0f1e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            display: flex;
        }
        .landscape-left {
            flex: 1.2;
            background: linear-gradient(rgba(10, 15, 30, 0.6), rgba(10, 15, 30, 0.9)), 
                        url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8%;
            border-right: 1px solid var(--glass-border);
            position: relative;
        }
        .landscape-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 10% 10%, rgba(192, 132, 252, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .landscape-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 5%;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 3.5rem;
            border-radius: 32px;
            border: 1px solid rgba(192, 132, 252, 0.2);
            box-shadow: 0 50px 120px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--admin-purple), transparent);
            animation: scanLine 4s linear infinite;
        }
        input {
            width: 100%;
            padding: 1.2rem 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--glass-border);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            letter-spacing: 0.02em;
        }
        input:focus {
            border-bottom-color: var(--admin-purple);
        }
        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 2.5rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 30px rgba(168, 85, 247, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(168, 85, 247, 0.5);
        }
        .back-home {
            position: absolute;
            top: 2rem;
            right: 2rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.3s;
            z-index: 100;
        }
        .back-home:hover { color: #fff; }
        
        @media (max-width: 768px) {
            .back-home {
                top: 1rem;
                right: 1.5rem;
                font-size: 0.8rem;
            }
        }
        
        @keyframes scanLine {
            0% { transform: translateY(-100px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(600px); opacity: 0; }
        }
    </style>
</head>
<body class="auth-page-body">
    
    <div class="landscape-left">
        <h1 style="font-size: 4.5rem; font-weight: 950; margin: 0; letter-spacing: -0.05em; background: linear-gradient(to right, #fff, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Dumbo Admin</h1>
        <p style="font-size: 1.4rem; color: #94a3b8; line-height: 1.5; max-width: 500px; margin-top: 1.5rem; font-weight: 500;">Institutional Management Terminal.</p>
        
        <div style="margin-top: 4rem; display: flex; gap: 4rem;">
            <div><h3 style="margin: 0; font-size: 1.8rem; color: #c084fc;">Vault</h3><p style="color: #64748b; margin: 0.5rem 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem;">Access Control</p></div>
            <div><h3 style="margin: 0; font-size: 1.8rem; color: #38bdf8;">Root</h3><p style="color: #64748b; margin: 0.5rem 0; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.75rem;">Command Node</p></div>
        </div>
    </div>

    <div class="landscape-right">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> RETURN TO SECURITY HUB</a>
        
        <div class="auth-container">
            <h2 style="font-size: 2.2rem; font-weight: 900; margin-bottom: 3rem; letter-spacing: -0.02em; color: #fff;">Admin Portal</h2>
            
            <form id="loginForm">
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; color: #64748b; font-size: 0.8rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Credential ID</label>
                    <input type="email" id="email" placeholder="ADMIN_UNIT_01" required>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: #64748b; font-size: 0.8rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">Authorization Key</label>
                    <input type="password" id="password" required>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.6rem; color: #94a3b8; font-size: 0.9rem; cursor: pointer;">
                        <input type="checkbox" id="rememberMe" style="width: auto;"> Persistent Session
                    </label>
                    <a href="forgot-password.html" style="color: #c084fc; text-decoration: none; font-size: 0.9rem; font-weight: 800;">Secure Reset</a>
                </div>
                
                <button type="submit" id="loginBtn" class="btn-submit">Initialize Vault Access</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            try {
                loginBtn.textContent = 'VALIDATING ENTITY...';
                loginBtn.disabled = true;

                const res = await fetch(`${CONFIG.API_BASE_URL}/api/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', data.user.fullName);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userRole', data.user.role);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert('AUTHENTICATION FAILED: Credentials Rejected by Vault Node.');
                }
            } catch (err) {
                console.error(err);
                alert('SYSTEM ERROR: Authentication Server Unreachable.');
            } finally {
                loginBtn.textContent = 'Initialize Vault Access';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
