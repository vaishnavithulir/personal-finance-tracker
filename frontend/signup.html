<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Dumbo Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page" style="flex-direction: column; justify-content: center; align-items: center; min-height: 100vh;">
    
    <!-- Branding Header -->
    <div style="text-align: center; margin-bottom: 2.5rem; animation: fadeInDown 0.8s ease;">

        <h2 style="font-size: 2.5rem; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; background: linear-gradient(135deg, #fff 0%, var(--primary) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Dumbo Finance</h2>
    </div>

    <!-- Main Auth Card -->
    <div class="auth-container" style="max-width: 500px; padding: 2.5rem; background: #fff; color: #333; border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
        <h3 style="text-align: center; text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 2rem; font-weight: 700;">User Registration</h3>
        
        <form id="signupForm">
            <div style="display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 1.5rem;">
                <i class="far fa-user" style="font-size: 1.5rem; color: #666; padding-bottom: 8px;"></i>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label style="color: #666; font-size: 0.85rem; margin-bottom: 4px;">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe" required style="background: transparent; border: none; border-bottom: 1px solid #ddd; border-radius: 0; color: #333; padding-left: 0;">
                </div>
            </div>

            <div style="display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 1.5rem;">
                <i class="far fa-envelope" style="font-size: 1.5rem; color: #666; padding-bottom: 8px;"></i>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label style="color: #666; font-size: 0.85rem; margin-bottom: 4px;">Email</label>
                    <input type="email" id="email" placeholder="email@address.com" required style="background: transparent; border: none; border-bottom: 1px solid #ddd; border-radius: 0; color: #333; padding-left: 0;">
                </div>
            </div>
            
            <div style="display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2.5rem;">
                <i class="fas fa-lock" style="font-size: 1.5rem; color: #666; padding-bottom: 8px;"></i>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label style="color: #666; font-size: 0.85rem; margin-bottom: 4px;">Password</label>
                    <input type="password" id="password" required style="background: transparent; border: none; border-bottom: 1px solid #ddd; border-radius: 0; color: #333; padding-left: 0;">
                </div>
            </div>

            <div style="display: flex; align-items: flex-end; gap: 1rem; margin-bottom: 2.5rem;">
                <i class="fas fa-phone" style="font-size: 1.5rem; color: #666; padding-bottom: 8px;"></i>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label style="color: #666; font-size: 0.85rem; margin-bottom: 6px;">Phone Number (Mobile Sync)</label>
                    <input type="tel" id="phoneNumber" placeholder="+91 90000 00000" class="premium-input">
                </div>
            </div>
            
            <button type="submit" id="submitBtn" style="background: #38bdf8; color: white; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; height: 50px; border-radius: 6px;">Create Account</button>
        </form>
    </div>

    <!-- Additional Links -->
    <div style="text-align: center; margin-top: 2rem; animation: fadeInUp 0.8s ease;">
        <p style="color: #cbd5e1; margin-bottom: 1.5rem;">Already have an account?</p>
        <button onclick="window.location.href='login.html'" style="width: auto; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.75rem 3rem; border-radius: 6px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; margin-top: 0;">Sign In</button>
    </div>

    <style>
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group input:focus {
            border-bottom-color: #38bdf8 !important;
            box-shadow: none !important;
        }
    </style>

    <script src="config.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');

            try {
                submitBtn.textContent = '...';
                submitBtn.disabled = true;

                const res = await fetch(`${CONFIG.API_BASE_URL}/api/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userName', data.user.fullName);
                    localStorage.setItem('userEmail', data.user.email);
                    window.location.href = 'role-selection.html';
                } else {
                    alert(data.msg || 'Registration failed.');
                }
            } catch (err) {
                console.error(err);
                alert('Server error.');
            } finally {
                submitBtn.textContent = 'Create Account';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
