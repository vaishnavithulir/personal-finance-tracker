<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Console - Dumbo Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --bg-deep: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .zenith-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Branding Left */
        .branding-chamber {
            flex: 1.2;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
        }

        .branding-chamber img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: saturate(0.5) contrast(1.2);
        }

        .branding-content {
            position: relative;
            z-index: 2;
            text-align: left;
            max-width: 600px;
        }

        .branding-title {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff 40%, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .branding-motto {
            font-size: 1.4rem;
            color: var(--text-gray);
            line-height: 1.5;
            font-weight: 500;
            margin-bottom: 3rem;
        }

        /* Vault Right */
        .vault-chamber {
            flex: 1;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .auth-card-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-to-global {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: 0.3s;
            align-self: flex-end;
            margin-right: 1rem;
        }

        .back-to-global:hover {
            color: #fff;
            transform: translateX(-5px);
        }

        .auth-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3.5rem;
            backdrop-filter: blur(40px);
        }

        .vault-header h1 {
            color: #ffffff !important;
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        .input-group label {
            display: block;
            color: var(--text-gray);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 0.75rem;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(56, 189, 248, 0.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        .btn-reset {
            width: 100%;
            background: #c2a265;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 1.25rem;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 1rem;
        }

        .btn-reset:hover {
            background: #d4b884;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(194, 162, 101, 0.3);
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 1024px) {
            .branding-chamber { display: none; }
        }
    </style>
</head>
<body>
    <div class="zenith-layout">
        <!-- Branding Left -->
        <div class="branding-chamber">
            <img src="zenith_institutional_dashboard_1777195534688.png" alt="Dumbo Zenith Terminal">
            <div class="branding-content">
                <h1 class="branding-title">Dumbo Finance</h1>
                <p class="branding-motto">Recovery Console. Secure identity re-synchronization corridor.</p>
            </div>
        </div>

        <!-- Vault Right -->
        <div class="vault-chamber">
            <div class="auth-card-container">
                <a href="login-selection.html" class="back-to-global">
                    <i class="fas fa-arrow-left"></i> BACK TO LOGIN
                </a>

                <div class="auth-card">
                    <div class="vault-header">
                        <h1>Recover Key</h1>
                        <p style="color: var(--text-gray); margin-bottom: 2rem;">Enter your institutional email to re-establish your security key.</p>
                    </div>

                    <form id="recoveryForm">
                        <div class="input-group">
                            <label>Registered Institutional Email</label>
                            <input type="email" id="email" class="input-field" placeholder="name@institution.com" required>
                        </div>

                        <div class="input-group">
                            <label>New Security Key</label>
                            <input type="password" id="password" class="input-field" placeholder="Minimum 8 characters" required minlength="8">
                        </div>

                        <button type="submit" id="resetBtn" class="btn-reset">Re-Initialize Key</button>
                    </form>

                    <div style="margin-top: 2rem; text-align: center;">
                        <a href="signup.html" style="color: var(--primary); text-decoration: none; font-size: 0.85rem; font-weight: 700;">REQUEST NEW ACCESS</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('recoveryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resetBtn = document.getElementById('resetBtn');
            const originalText = resetBtn.textContent;

            try {
                resetBtn.textContent = 'SYNCHRONIZING...';
                resetBtn.disabled = true;

                const res = await fetch(`${CONFIG.API_BASE_URL}/api/users/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('SUCCESS: Institutional Security Key re-synchronized. You may now enter the vault.');
                    window.location.href = 'login-selection.html';
                } else {
                    alert('RECOVERY REJECTED: ' + (data.msg || 'Identity not recognized in the active vault.'));
                }
            } catch (err) {
                console.error(err);
                alert('CRITICAL ERROR: Security hub unreachable.');
            } finally {
                resetBtn.textContent = originalText;
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
