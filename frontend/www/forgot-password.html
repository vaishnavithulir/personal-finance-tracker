<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Access - Dumbo Finance</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #c5a059;
            --bg-dark: #0a0f1e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: radial-gradient(circle at center, #1a233a 0%, #0a0f1e 100%);
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        input {
            width: 100%;
            padding: 1.1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.06); }
        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            color: #0a0f1e;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="auth-container">
        <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--primary); margin-bottom: 1.5rem;"></i>
        <h2 style="font-size: 1.8rem; margin-bottom: 1rem;">Institutional Recovery</h2>
        <p style="color: #94a3b8; margin-bottom: 2.5rem; font-size: 0.95rem;">Provide your registered credentials to reset your secure access key.</p>
        
        <form id="resetForm">
            <input type="email" id="email" placeholder="Registered Email Entity" required>
            <input type="password" id="newPassword" placeholder="New Security Key (Min 8 chars)" required>
            <button type="submit" id="resetBtn" class="btn-submit">Reset Access Key</button>
        </form>
        
        <div style="margin-top: 2rem;">
            <a href="login.html" style="color: #64748b; text-decoration: none; font-size: 0.9rem; font-weight: 600;"><i class="fas fa-arrow-left" style="margin-right: 0.5rem;"></i> Return to Sign In</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('newPassword').value;
            const btn = document.getElementById('resetBtn');

            if (password.length < 8) return alert('Key must be 8+ characters.');

            try {
                btn.textContent = 'RECONFIGURING...';
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/users/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('Access Key reset successful. Redirecting to vault...');
                    window.location.href = 'login.html';
                } else {
                    alert(data.msg || 'Recovery failed.');
                }
            } catch (err) {
                alert('Connection error.');
            } finally {
                btn.textContent = 'RESET ACCESS KEY';
            }
        });
    </script>
</body>
</html>
