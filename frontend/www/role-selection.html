<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - Dumbo Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page" style="flex-direction: column; min-height: 100vh; padding-top: 5rem;">
    <h1 style="margin-bottom: 4rem; font-size: 3rem;">How would you like to continue?</h1>
    
    <div style="display: flex; gap: 2.5rem; width: 100%; max-width: 900px; justify-content: center;">
        <div class="feature-card" onclick="selectRole('admin')" style="cursor: pointer; flex: 1; text-align: center; padding: 4rem 2rem;">
            <i class="fas fa-user-shield" style="font-size: 4rem; color: var(--primary); margin-bottom: 2rem;"></i>
            <h3>Admin Portal</h3>
            <p>Manage users, oversee all transactions, and access advanced financial analytics.</p>
        </div>

        <div class="feature-card" onclick="selectRole('user')" style="cursor: pointer; flex: 1; text-align: center; padding: 4rem 2rem;">
            <i class="fas fa-user" style="font-size: 4rem; color: var(--primary); margin-bottom: 2rem;"></i>
            <h3>User Portal</h3>
            <p>Track your personal expenses, manage your own budget, and save smarter.</p>
        </div>
    </div>
    <script>
        function selectRole(role) {
            localStorage.setItem('selectedRole', role);
            localStorage.setItem('userRole', role);
            window.location.href = 'dashboard.html';
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
