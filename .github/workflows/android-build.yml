name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x frontend/android/gradlew

      - name: Fix line endings for gradlew
        run: sed -i 's/\r$//' frontend/android/gradlew

      - name: Sync Capacitor Plugins
        run: |
          cd frontend
          npm install
          npx cap update android

      - name: Build with Gradle
        run: cd frontend/android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dumbo-finance-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
